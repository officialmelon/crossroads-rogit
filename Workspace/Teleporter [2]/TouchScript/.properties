[{"value":null,"name":"Capabilities","valueType":"SecurityCapabilities"},{"value":"Script","name":"ClassName","valueType":"string"},{"value":false,"name":"Disabled","valueType":"boolean"},{"value":"","name":"LinkedSource","valueType":"string"},{"value":"TouchScript","name":"Name","valueType":"string"},{"value":["RunContext","Legacy"],"name":"RunContext","valueType":"EnumItem"},{"value":"local teleporter = script.Parent\n\nlocal beam_1 = teleporter.teleBeam1\nlocal beam_2 = teleporter.teleBeam2\nlocal beam_3 = teleporter.teleBeam3\n\nlocal spinCo \n\nlocal vCharacter\nlocal torso\nlocal humanoid\n\nfunction spin()\n\tif vCharacter and torso and humanoid then \t\t\n\t\thumanoid.WalkSpeed = 0.0\n\t\ttorso.CFrame = beam_2.CFrame\t+ Vector3.new(0, -2, 0)\t\n\t\tbg = Instance.new(\"BodyGyro\")\n\t\tbg.Name = \"Spin\"\n\t\tbg.maxTorque = Vector3.new(100000, 100000, 100000)\n\t\tbg.P = 100000\n\t\tbg.Parent = torso\n\t\tbg.cframe = torso.CFrame\n\n\t\tfire = Instance.new(\"Fire\")\n\t\tfire.Parent = beam_3\n\t\tfire.Color = Color3.new(0, 0, 0.6)\n\t\tfire.SecondaryColor = Color3.new(0, 0, 0)\n\t\tfire.Heat = 20\n\t\tfire.Size = 5\n\t\t\n\t\tbv = Instance.new(\"BodyVelocity\")\n\t\tbv.Name = \"Rise\"\n\t\tbv.Parent = torso\n\t\tbv.P = 100000\n\t\tbv.maxForce = Vector3.new(0, bv.P, 0)\n\t\tlocal v = Vector3.new(0, 0.1, 0)\n\t\tfor i = 1, 180 do \n\t\t\tbg.cframe = torso.CFrame * CFrame.Angles(0, i * math.pi/10, 0)\n\t\t\tbv.velocity = v * i/10\n\t\t\twait()\n\t\tend\n\t\tif bg then bg:Remove() end\t\n\t\tif bv then bv:Remove () end\n\t\tif fire then fire:Remove() end\n\t\thumanoid.WalkSpeed = 16.0\t\t\n\tend\nend\n\nfunction tele(hit) \n\tprint(\"In function\")\n\tif not hit or not hit.Parent then return end \n\tprint(\"found hit\")\n\thumanoid = hit.Parent:FindFirstChild(\"Humanoid\") \n\ttorso = hit.Parent:FindFirstChild(\"Torso\")\n\tif not humanoid then return end \n\tif not torso then return end\n\tprint(\"Found humanoid\")\n\tvCharacter = hit.Parent \n\tif vCharacter then \n\t\tprint(\"Found character\")\t\t\t\n\t\ttp = vCharacter:FindFirstChild(\"TeleportScript\")\n\t\tif spinCo == nil or coroutine.status(spinCo) == 'dead' then\n\t\t\tspinCo = coroutine.create(spin)\n\t\t\tcoroutine.resume(spinCo)\n\t\tend\n\t\tif tp == nil then \n\t\t\tprint(\"Cloning Script\")\n\t\t\ttp = script.TeleportScript:Clone() \n\t\t\ttp.Parent = vCharacter \n\t\t\twait(1.0) \n\t\t\ttp.Disabled = false \n\t\telse\n\t\t\twait(1.0)\n\t\t\ttp.Disabled = true\n\t\t\twait(0.1)\n\t\t\ttp.Disabled = false \n\t\tend\n\tend \nend\n\n\n\nbeam_1.Touched:connect(tele)\nbeam_2.Touched:connect(tele)\nbeam_3.Touched:connect(tele)\n\n\n","name":"Source","valueType":"string"},{"value":[{"value":"b0c9ca97-1894-4b08-bb5f-d514ab103ac1","name":"_rogit_id","valueType":"string"}],"name":"_attributes","valueType":"_attributes"}]